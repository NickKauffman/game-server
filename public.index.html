<!DOCTYPE html>
<html>
<head>
  <title>Game Room</title>
  <style>
    body { background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    #code { font-size: 120px; font-weight: bold; color: #7c3aed; letter-spacing: 16px; }
    #status { font-size: 24px; color: #aaa; margin-top: 16px; }
    #players { margin-top: 32px; font-size: 28px; }
    #log { margin-top: 24px; font-size: 20px; color: #4ade80; }
  </style>
</head>
<body>
  <div id="status">Starting...</div>
  <div id="code"></div>
  <div id="players"></div>
  <div id="log"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const players = [];

    socket.on('connect', () => {
      document.getElementById('status').textContent = 'Share this code with players:';
      socket.emit('create-room');
    });

    socket.on('room-created', (code) => {
      document.getElementById('code').textContent = code;
    });

    socket.on('player-joined', ({ name }) => {
      players.push(name);
      document.getElementById('players').textContent = '👥 ' + players.join(', ');
    });

    socket.on('button-press', ({ button, id }) => {
      document.getElementById('log').textContent = '🎮 Button: ' + button;
      setTimeout(() => document.getElementById('log').textContent = '', 1000);
    });
  </script>
</body>
</html>
